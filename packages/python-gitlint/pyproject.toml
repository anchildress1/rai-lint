[build-system]
requires = ["setuptools>=80.0"]
build-backend = "setuptools.build_meta"

[project]
name = "gitlint-rai"
dynamic = ["version"]
authors = [
  { name="Ashley Childress", email="anchildress1@gmail.com" },
]
readme = "README.md"
description = "Gitlint plugin for RAI footer validation"
requires-python = ">=3.11,<3.15"
keywords = ["gitlint", "rai", "ai-attribution", "commit-validation"]
dependencies = ["gitlint>=0.19.1"]
license = "LicenseRef-PolyForm-Shield-1.0.0"
license-files = ["LICENSE"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Software Development :: Version Control :: Git",
    "Typing :: Typed",
]

[tool.setuptools.dynamic]
version = {attr = "gitlint_rai.version.__version__"}

[project.urls]
Homepage = "https://github.com/anchildress1/rai-lint"
Repository = "https://github.com/anchildress1/rai-lint"
Issues = "https://github.com/anchildress1/rai-lint/issues"

[project.optional-dependencies]

[dependency-groups]
dev = [
    "pytest>=8.4.0",
    "pytest-cov>=4.0.0",
    "black>=25.9.0",
    "isort>=7.0.0",
    "coverage>=7.0.0",
    "build>=0.10.0",
    "wheel",
]

# CI-only resolution override: gitlint pins sh<2.0, whose only artifact is
# an sdist — building it would defeat `uv sync --no-build` in workflows.
# sh 2.x ships wheels; the suite (including real-gitlint subprocess runs)
# gates that the override stays compatible. User installs are unaffected —
# published metadata still defers to gitlint's own pins.
[tool.uv]
override-dependencies = ["sh>=2.0 ; sys_platform != 'win32'"]
# wait out newly published versions before resolving them
exclude-newer = "7 days"

[tool.setuptools.packages.find]
where = ["."]
include = ["gitlint_rai*"]

[tool.setuptools.package-data]
gitlint_rai = ["py.typed", "sbom/sbom.cdx.json"]

[project.scripts]
gitlint-rai = "gitlint_rai.__main__:main"

[tool.coverage.run]
source = ["gitlint_rai"]
omit = [
    "tests/*",
    "*/test_*",
    "*/__pycache__/*",
    ".venv/*",
    "venv/*",
    "version.py",
    "**/__init__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
]
show_missing = true
precision = 2
fail_under = 80

[tool.coverage.xml]
output = "reports/coverage.xml"

[tool.pytest.ini_options]
addopts = "--junitxml=reports/junit-py.xml --cov=gitlint_rai --cov-report=term-missing"
testpaths = ["tests"]
# lets CI test straight from source (uv sync --no-build --no-install-project)
pythonpath = ["."]

[tool.black]
line-length = 100
target-version = ['py311', 'py312', 'py313', 'py314']

[tool.isort]
profile = "black"
line_length = 100
