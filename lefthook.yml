pre-commit:
  commands:
    format:
      glob: "*.{js,ts,json,md}"
      run: npm run format
      stage_fixed: true
    lint-node:
      glob: "packages/node-commitlint/**/*.{js,ts}"
      run: cd packages/node-commitlint && npm run lint
      stage_fixed: true
    lint-python:
      glob: "packages/python-gitlint/**/*.py"
      run: cd packages/python-gitlint && uv run black gitlint_rai/ tests/ && uv run isort gitlint_rai/ tests/
      stage_fixed: true
    test-node:
      glob: "packages/node-commitlint/**/*.{js,ts}"
      run: cd packages/node-commitlint && npm test
    test-python:
      glob: "packages/python-gitlint/**/*.py"
      run: cd packages/python-gitlint && uv run pytest tests/ -v
    update-npm-lock:
      glob: "{package.json,packages/*/package.json}"
      # any platform-specific input (an existing node_modules or a stale
      # lock baseline) makes npm silently drop other platforms' optional
      # deps; only a fully clean regeneration is safe
      run: rm -rf node_modules packages/*/node_modules package-lock.json && npm install --ignore-scripts
      stage_fixed: true
    update-uv-lock:
      glob: "packages/python-gitlint/pyproject.toml"
      run: cd packages/python-gitlint && uv lock
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npx --no-install commitlint --edit {1}
