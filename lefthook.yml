pre-commit:
  commands:
    format:
      glob: "*.{js,ts,json,md}"
      run: npm run format
      stage_fixed: true
    lint-node:
      glob: "packages/node-commitlint/**/*.{js,ts}"
      run: cd packages/node-commitlint && npm run lint
      stage_fixed: true
    lint-python:
      glob: "packages/python-gitlint/**/*.py"
      run: cd packages/python-gitlint && uv run black gitlint_rai/ tests/ && uv run isort gitlint_rai/ tests/
      stage_fixed: true
    test-node:
      glob: "packages/node-commitlint/**/*.{js,ts}"
      run: cd packages/node-commitlint && npm test
    test-python:
      glob: "packages/python-gitlint/**/*.py"
      run: cd packages/python-gitlint && uv run pytest tests/ -v
    update-npm-lock:
      glob: "{package.json,packages/*/package.json}"
      # regenerate from scratch: re-resolving against an existing lock
      # (on any platform) can drop hoisted platform-specific optional
      # deps and break npm ci elsewhere
      run: rm -f package-lock.json && npm install --ignore-scripts --package-lock-only
      stage_fixed: true
    update-uv-lock:
      glob: "packages/python-gitlint/pyproject.toml"
      run: cd packages/python-gitlint && uv lock
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npx --no-install commitlint --edit {1}
