sonar.projectKey=anchildress1_rai-lint
sonar.organization=anchildress1
sonar.host.url=https://sonarcloud.io
sonar.sources=packages/node-commitlint/src,packages/python-gitlint/gitlint_rai,.github
sonar.tests=packages/node-commitlint/tests,packages/python-gitlint/tests
sonar.exclusions=**/node_modules/**,**/dist/**,**/.venv/**,**/__pycache__/**
sonar.javascript.lcov.reportPaths=packages/node-commitlint/reports/lcov.info
sonar.python.coverage.reportPaths=packages/python-gitlint/reports/coverage.xml
sonar.python.version=3.11, 3.12, 3.13, 3.14
# Exclude test directories and test files from duplication (CPD) checks only
sonar.cpd.exclusions=packages/*/tests/**
