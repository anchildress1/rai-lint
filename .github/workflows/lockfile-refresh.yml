name: Lockfile Refresh (release-please only)

on:
    workflow_run:
      workflows:
        - Release Please
      types:
        - completed
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    resolve-release-please-branch:
        name: Resolve release-please branch
        runs-on: ubuntu-latest
        permissions:
            pull-requests: read
        timeout-minutes: 2
        outputs:
            ref: ${{ steps.release_branch.outputs.ref }}
        if: >
          (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
          ||
          (github.event_name == 'workflow_dispatch')

        steps:
            - name: Find open release-please branch
              id: release_branch
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  api="https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=100"
                  branches_json=$(curl -fsSL \
                    -H "Authorization: Bearer ${GH_TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "${api}" \
                    | jq -c '[.[] | select(.head.ref | startswith("release-please--")) | .head.ref] | unique')

                  count=$(echo "${branches_json}" | jq -r 'length')
                  if [ "${count}" = "0" ]; then
                    echo "No open release-please--* PR branches found; skipping lockfile refresh."
                    echo "ref=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  if [ "${count}" != "1" ]; then
                    echo "Expected exactly 1 open release-please--* PR branch, found ${count}:" >&2
                    echo "${branches_json}" | jq -r '.[]' >&2
                    exit 1
                  fi

                  ref=$(echo "${branches_json}" | jq -r '.[0]')
                  echo "Found release-please branch: ${ref}"
                  echo "ref=${ref}" >> "$GITHUB_OUTPUT"

    refresh-npm-lockfiles:
        name: Refresh npm lockfiles
        runs-on: ubuntu-latest
        needs:
            - resolve-release-please-branch
        permissions:
            contents: write
        timeout-minutes: 4
        if: >
          (
            (
              (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
              ||
              (github.event_name == 'workflow_dispatch')
            )
            &&
            (needs.resolve-release-please-branch.outputs.ref != '')
            &&
            startsWith(needs.resolve-release-please-branch.outputs.ref, 'release-please--')
          )

        steps:
            - name: Checkout release-please branch
              uses: actions/checkout@v7.0.0
              with:
                  ref: ${{ needs.resolve-release-please-branch.outputs.ref }}
                  persist-credentials: false

            - name: Pull latest changes
              run: git pull

            - name: Echo checked-out branch
              run: |
                  set -euo pipefail
                  echo "Checked out: $(git rev-parse --abbrev-ref HEAD)"

            - name: Get Node version from Volta
              id: node-version
              run: echo "version=$(jq -r '.volta.node' packages/node-commitlint/package.json)" >> "$GITHUB_OUTPUT"

            - name: Setup Node
              uses: actions/setup-node@v6.4.0
              with:
                  node-version: ${{ steps.node-version.outputs.version }}
                  cache: npm

            - name: Refresh npm lockfiles (root)
              run: npm install --ignore-scripts --package-lock-only

            # persist-credentials is false on checkout (untrusted-checkout hardening),
            # so push explicitly with a scoped token instead of git-auto-commit-action.
            - name: Commit and push refreshed npm lockfiles
              env:
                  GH_TOKEN: ${{ github.token }}
                  REF: ${{ needs.resolve-release-please-branch.outputs.ref }}
              run: |
                  set -euo pipefail
                  if git diff --quiet -- package-lock.json; then
                    echo "No npm lockfile changes to commit."
                    exit 0
                  fi
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add package-lock.json
                  git commit -m "chore: refresh npm lockfiles"
                  git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/heads/${REF}"

    refresh-uv-lockfile:
        name: Refresh uv.lock
        runs-on: ubuntu-latest
        needs:
            - resolve-release-please-branch
            - refresh-npm-lockfiles
        permissions:
            contents: write
        timeout-minutes: 4
        if: >
          (
            (
              (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
              ||
              (github.event_name == 'workflow_dispatch')
            )
            &&
            (needs.resolve-release-please-branch.outputs.ref != '')
            &&
            startsWith(needs.resolve-release-please-branch.outputs.ref, 'release-please--')
          )

        steps:
            - name: Checkout release-please branch
              uses: actions/checkout@v7.0.0
              with:
                  ref: ${{ needs.resolve-release-please-branch.outputs.ref }}
                  persist-credentials: false

            - name: Pull latest changes
              run: git pull

            - name: Echo checked-out branch
              run: |
                  set -euo pipefail
                  echo "Checked out: $(git rev-parse --abbrev-ref HEAD)"

            - name: Setup Python
              uses: actions/setup-python@v6.2.0
              with:
                  python-version: "3.12"

            - name: Setup uv
              uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
              with:
                  enable-cache: true

            - name: Refresh uv lockfile
              working-directory: packages/python-gitlint
              run: uv lock

            # persist-credentials is false on checkout (untrusted-checkout hardening),
            # so push explicitly with a scoped token instead of git-auto-commit-action.
            - name: Commit and push refreshed uv.lock
              env:
                  GH_TOKEN: ${{ github.token }}
                  REF: ${{ needs.resolve-release-please-branch.outputs.ref }}
              run: |
                  set -euo pipefail
                  if git diff --quiet -- packages/python-gitlint/uv.lock; then
                    echo "No uv.lock changes to commit."
                    exit 0
                  fi
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add packages/python-gitlint/uv.lock
                  git commit -m "chore: refresh uv.lock"
                  git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/heads/${REF}"
