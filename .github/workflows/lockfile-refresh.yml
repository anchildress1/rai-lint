name: Lockfile Refresh (release-please only)

on:
    workflow_run:
      workflows:
        - Release Please
      types:
        - completed
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    resolve-release-please-branches:
        name: Resolve release-please branches
        runs-on: ubuntu-latest
        permissions:
            pull-requests: read
        timeout-minutes: 2
        outputs:
            refs: ${{ steps.release_branch.outputs.refs }}
        if: >
          (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
          ||
          (github.event_name == 'workflow_dispatch')

        steps:
            # separate-pull-requests is on, so each component opens its own
            # release-please--* branch. Emit every open one as a JSON array and
            # let the downstream jobs fan out over it via a matrix.
            - name: Find open release-please branches
              id: release_branch
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  api="https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=100"
                  branches_json=$(curl -fsSL \
                    -H "Authorization: Bearer ${GH_TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "${api}" \
                    | jq -c '[.[] | select(.head.ref | startswith("release-please--")) | .head.ref] | unique')

                  count=$(echo "${branches_json}" | jq -r 'length')
                  if [ "${count}" = "0" ]; then
                    echo "No open release-please--* PR branches found; skipping lockfile refresh."
                    echo "refs=[]" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  echo "Found ${count} release-please branch(es):"
                  echo "${branches_json}" | jq -r '.[]'
                  echo "refs=${branches_json}" >> "$GITHUB_OUTPUT"

    # Read-only by design: this job checks out and *executes* the resolved
    # branch (npm/uv resolve build backends), so it must never hold write
    # access or push credentials. The refreshed lockfiles leave as an artifact.
    refresh-lockfiles:
        name: Refresh lockfiles (${{ matrix.ref }})
        runs-on: ubuntu-latest
        needs:
            - resolve-release-please-branches
        permissions:
            contents: read
        timeout-minutes: 6
        if: needs.resolve-release-please-branches.outputs.refs != '[]'
        strategy:
            fail-fast: false
            matrix:
                ref: ${{ fromJSON(needs.resolve-release-please-branches.outputs.refs) }}

        steps:
            # Clone over public HTTPS instead of actions/checkout so this
            # workflow_run job never performs a privileged checkout of an
            # untrusted ref (untrusted-checkout, cache-poisoning). Public repo:
            # no token needed, and the job is read-only — it only uploads the
            # refreshed lockfiles as an artifact.
            - name: Clone release-please branch
              env:
                  REF: ${{ matrix.ref }}
              run: |
                  set -euo pipefail
                  git clone --depth=1 --single-branch --branch "${REF}" \
                    "https://github.com/${GITHUB_REPOSITORY}.git" .

            - name: Get Node version from Volta
              id: node-version
              run: echo "version=$(jq -r '.volta.node' packages/node-commitlint/package.json)" >> "$GITHUB_OUTPUT"

            # Caching is intentionally disabled in this job: it runs untrusted
            # code under workflow_run, so a populated cache could poison the
            # default-branch cache scope (cache-poisoning).
            - name: Setup Node
              uses: actions/setup-node@v6.4.0
              with:
                  node-version: ${{ steps.node-version.outputs.version }}

            - name: Refresh npm lockfile
              run: npm install --ignore-scripts --package-lock-only

            - name: Setup Python
              uses: actions/setup-python@v6.2.0
              with:
                  python-version: "3.12"

            - name: Setup uv
              uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
              with:
                  enable-cache: false

            - name: Refresh uv lockfile
              working-directory: packages/python-gitlint
              run: uv lock

            - name: Upload refreshed lockfiles
              uses: actions/upload-artifact@v7.0.1
              with:
                  name: refreshed-lockfiles-${{ matrix.ref }}
                  path: |
                      package-lock.json
                      packages/python-gitlint/uv.lock
                  retention-days: 1

    # Privileged (contents: write) but never executes branch code: it only
    # restores the lockfile artifact and pushes. No execution clears the
    # untrusted-checkout/critical finding; persist-credentials:false keeps the
    # checkout from leaving push credentials in the working tree (high finding).
    commit-lockfiles:
        name: Commit refreshed lockfiles (${{ matrix.ref }})
        runs-on: ubuntu-latest
        needs:
            - resolve-release-please-branches
            - refresh-lockfiles
        permissions:
            contents: write
        timeout-minutes: 4
        if: needs.resolve-release-please-branches.outputs.refs != '[]'
        strategy:
            fail-fast: false
            matrix:
                ref: ${{ fromJSON(needs.resolve-release-please-branches.outputs.refs) }}

        steps:
            - name: Download refreshed lockfiles
              uses: actions/download-artifact@v8.0.1
              with:
                  name: refreshed-lockfiles-${{ matrix.ref }}
                  path: refreshed

            - name: Commit and push refreshed lockfiles
              env:
                  GH_TOKEN: ${{ github.token }}
                  REF: ${{ matrix.ref }}
              run: |
                  set -euo pipefail

                  # Clone only the branch tip over public HTTPS (no auth, no
                  # actions/checkout). The lockfiles are applied as data and
                  # never executed, so this privileged step runs no branch code
                  # and never performs a privileged checkout of an untrusted ref.
                  git clone --depth=1 --single-branch --branch "${REF}" \
                    "https://github.com/${GITHUB_REPOSITORY}.git" branch

                  cp refreshed/package-lock.json branch/package-lock.json
                  cp refreshed/packages/python-gitlint/uv.lock branch/packages/python-gitlint/uv.lock

                  cd branch
                  if git diff --quiet; then
                    echo "No lockfile changes to commit."
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add package-lock.json packages/python-gitlint/uv.lock
                  git commit -m "chore: refresh lockfiles"
                  git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
                    "HEAD:refs/heads/${REF}"
