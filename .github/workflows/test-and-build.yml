name: Test and Build

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-tests:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 9
    if: (github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false) && !startsWith(github.head_ref, 'release-please--')
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [22, 24, 26]
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      # Install root dependencies first to make shared dev tools (eslint, etc.) available
      # This is required in the monorepo setup before workspace-specific dependencies
      - name: Install root dependencies (locked)
        run: npm ci --ignore-scripts

      - name: Run linter
        run: npm run lint --workspace=packages/node-commitlint

      - name: Create reports directory
        run: mkdir -p packages/node-commitlint/reports

      - name: Run tests
        run: npm test --workspace=packages/node-commitlint

      # Dependabot and fork PRs don't receive repository secrets (even on
      # maintainer re-runs), so gate on the token itself
      - name: Upload Node coverage and test results to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: packages/node-commitlint/reports/lcov.info,packages/node-commitlint/reports/junit-vitest.xml
          flags: node
          fail_ci_if_error: true

      - name: Upload Node coverage artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: node-coverage-${{ matrix.node-version }}
          path: packages/node-commitlint/reports
          retention-days: 30

  bundle-analysis:
    name: Bundle Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 6
    if: (github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false) && !startsWith(github.head_ref, 'release-please--')
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Use Node.js 24
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: "npm"

      - name: Install root dependencies (locked)
        run: npm ci --ignore-scripts

      - name: Build workspace plugin
        run: npm run build --workspace commitlint-plugin-rai

      # Dependabot and fork PRs don't receive repository secrets (even on
      # maintainer re-runs), so gate on the token itself; the secrets context
      # is unavailable in step-level `if`, hence the output indirection
      - name: Check for Codecov token
        id: codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -n "$CODECOV_TOKEN" ]; then
            echo "has-token=true" >> "$GITHUB_OUTPUT"
          fi

      # The analyzer is os-restricted (darwin/linux) so it can't live in
      # devDependencies without breaking Windows installs; CI fetches it
      # on-demand instead, exact-pinned and with lifecycle scripts disabled
      - name: Upload bundle analysis to Codecov
        if: steps.codecov.outputs.has-token == 'true'
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          npx --yes --ignore-scripts @codecov/bundle-analyzer@2.0.1 packages/node-commitlint/dist \
            --bundle-name=commitlint-plugin-rai \
            --upload-token="$CODECOV_TOKEN" \
            --ignore-patterns="*.map"

  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 9
    if: (github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false) && !startsWith(github.head_ref, 'release-please--')
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    env:
      # The checked-in .python-version (3.13) would otherwise override the matrix interpreter
      UV_PYTHON: ${{ matrix.python-version }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: packages/python-gitlint
        run: uv sync --locked --group dev --no-build --no-install-project

      - name: Run Black and isort
        working-directory: packages/python-gitlint
        run: |
          uv run --frozen --no-build --no-sync black --check gitlint_rai tests/
          uv run --frozen --no-build --no-sync isort --check-only gitlint_rai tests/

      - name: Create reports directory
        working-directory: packages/python-gitlint
        run: mkdir -p reports

      - name: Run tests with coverage
        working-directory: packages/python-gitlint
        run: |
          uv run --frozen --no-build --no-sync pytest \
            --cov \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload Python coverage artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: python-coverage-${{ matrix.python-version }}
          path: packages/python-gitlint/reports
          retention-days: 30

      # Dependabot and fork PRs don't receive repository secrets (even on
      # maintainer re-runs), so gate on the token itself
      - name: Upload Python coverage and test results to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: packages/python-gitlint/reports/coverage.xml,packages/python-gitlint/reports/junit-py.xml
          flags: python
          fail_ci_if_error: true

  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && !startsWith(github.head_ref, 'release-please--')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: "npm"

      - name: Install root dependencies (locked)
        run: npm ci --ignore-scripts

      # commitlint.config.js loads the workspace plugin from dist/, which
      # --ignore-scripts leaves unbuilt
      - name: Build workspace plugin
        run: npm run build --workspace commitlint-plugin-rai

      # origin/<base> scopes the lint to branch-unique commits; base.sha
      # ranges re-lint history merged in from the base branch
      - name: Lint PR commit messages
        run: npx commitlint --from origin/${{ github.event.pull_request.base.ref }} --to ${{ github.event.pull_request.head.sha }}

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 6
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && !startsWith(github.head_ref, 'release-please--')
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Check if package files changed
        id: changed
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            package.json
            package-lock.json
            **/package.json
            **/pyproject.toml
            **/uv.lock
            **/requirements*.txt

      - name: Dependency Review
        if: steps.changed.outputs.any_changed == 'true'
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    timeout-minutes: 9
    needs: [node-tests, python-tests]
    if: (github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false) && !startsWith(github.head_ref, 'release-please--')
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Download Node coverage artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: node-coverage-*
          path: packages/node-commitlint/reports
          merge-multiple: true

      - name: Download Python coverage artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: python-coverage-*
          path: packages/python-gitlint/reports
          merge-multiple: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
