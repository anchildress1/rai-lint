name: Security Audit

on:
  schedule:
    - cron: "34 3 12,26 * *" # On the 12th and 26th of every month at 3:34 AM
  # every merge to main gets a fresh CodeQL/Trivy analysis so the default
  # branch never goes stale between the scheduled runs
  push:
    branches: [main]
  # License Compliance also runs on PRs that touch dependency files;
  # the other jobs are guarded with github.event_name != 'pull_request'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - package-lock.json
      - packages/python-gitlint/uv.lock
      - package.json
      - packages/*/package.json
      - packages/python-gitlint/pyproject.toml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    if: ${{ github.ref_type != 'tag' && github.event_name != 'pull_request' }}
    timeout-minutes: 12
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: "Run Trivy analysis"
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: "repo"
          scan-ref: "."
          format: "sarif"
          output: "results.sarif"
          scanners: "misconfig,secret"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true

      - name: "Upload artifact"
        uses: actions/upload-artifact@v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 30

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif

  license-scan:
    name: License Compliance
    runs-on: ubuntu-latest
    if: ${{ github.ref_type != 'tag' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false) }}
    timeout-minutes: 7
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Get Node version from package.json
        id: node-version
        run: echo "version=$(jq -r '.volta.node' packages/node-commitlint/package.json)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: ${{ steps.node-version.outputs.version }}

      - name: Install Node dependencies (locked)
        run: npm ci --ignore-scripts

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv sync --locked --no-dev --no-build --no-install-project --directory packages/python-gitlint/

      - name: Self-test license checker
        run: python3 .github/scripts/test_check_licenses.py

      - name: Check Node licenses
        run: |
          npx --yes --ignore-scripts license-checker@25.0.1 --json --excludePrivatePackages --production --start packages/node-commitlint > node-licenses.json
          python3 .github/scripts/check-licenses.py node-licenses.json

      - name: Generate Python SBOM
        working-directory: packages/python-gitlint
        run: |
          mkdir -p reports
          uvx --no-build --from cyclonedx-bom==7.1.0 cyclonedx-py environment \
            .venv/bin/python3 \
            --pyproject pyproject.toml \
            --mc-type library \
            --output-reproducible \
            --of JSON \
            -o reports/python-licenses.json

      - name: Check Python licenses
        run: |
          python3 .github/scripts/check-licenses.py packages/python-gitlint/reports/python-licenses.json


  # CodeQL analysis configured for javascript, python, and GitHub Actions workflows
  # Docs: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-the-codeql-action
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    if: ${{ github.ref_type != 'tag' && github.event_name != 'pull_request' }}
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: "Initialize CodeQL"
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          packs: codeql/actions-queries

      - name: "Build Node.js project"
        if: ${{ matrix.language == 'javascript-typescript' }}
        run: |
          npm ci --ignore-scripts
          npm run build --if-present

      - name: "Perform CodeQL Analysis"
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
